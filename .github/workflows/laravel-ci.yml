name: Docker Hub CI/CD for SmartRest API

on:
  push:
    branches:
      - develop
      - production
  pull_request:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up PHP 8.2
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # Install dependencies
      - name: Install Composer Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader

      # Debug: List root directory
      - name: List project directory
        run: ls -l

      # Optionally run your tests
      # - name: Run Tests
      #   run: php artisan test

      # Save the build artifact for the next job
      - name: Save build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartRest-artifact
          path: .

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Check out the repository (needed for Dockerfile, etc.)
      - name: Checkout code
        uses: actions/checkout@v3

      # Download the build artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: smartRest-artifact
          path: .

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build and push Docker image from the repo root
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/smartRest-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/smartRest-backend:${{ github.sha }}
